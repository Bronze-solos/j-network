<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>J-Network TierList System</title>
    <script src="https://cdn.jsdelivr.net/npm/skinview3d@3.4.1/bundles/skinview3d.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700;800&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-deep: #000814;
            --blue-ice: #00b4ff;
            --blue-mid: #0077cc;
            --blue-glow: rgba(0, 180, 255, 0.6);
            --blue-glow-soft: rgba(0, 150, 255, 0.3);
            --ht-gold: #ffcc00;
            --text-main: #ffffff;
            --text-dim: #6699bb;
            --border-dim: #002244;
            --border-mid: #003366;
            --border-bright: #004488;
        }

        body { background-color: var(--bg-deep); color: var(--text-main); font-family: 'Inter', sans-serif; margin: 0; overflow-x: hidden; }

        .background-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; overflow: hidden; }
        .bg-gradient { position: absolute; width: 100%; height: 100%; background: radial-gradient(ellipse at 30% 20%, #001a3a 0%, #000814 60%, #000205 100%); }
        .stars { position: absolute; width: 100%; height: 100%; background-image: radial-gradient(1px 1px at 10% 15%, rgba(200,235,255,0.8) 0%, transparent 100%), radial-gradient(1px 1px at 25% 40%, rgba(200,235,255,0.6) 0%, transparent 100%), radial-gradient(1.5px 1.5px at 40% 10%, rgba(200,235,255,0.9) 0%, transparent 100%), radial-gradient(1px 1px at 60% 30%, rgba(200,235,255,0.7) 0%, transparent 100%), radial-gradient(1px 1px at 75% 5%, rgba(200,235,255,0.5) 0%, transparent 100%), radial-gradient(1.5px 1.5px at 85% 45%, rgba(200,235,255,0.8) 0%, transparent 100%), radial-gradient(1px 1px at 90% 80%, rgba(200,235,255,0.7) 0%, transparent 100%); animation: twinkle 6s ease-in-out infinite alternate; }
        @keyframes twinkle { 0% { opacity: 0.6; } 100% { opacity: 1; } }

        .snowflake { position: absolute; color: rgba(200,235,255,0.9); user-select: none; pointer-events: none; animation: snowfall linear infinite; }
        @keyframes snowfall { 0% { transform: translateY(-30px) translateX(0) rotate(0deg); opacity: 0; } 5% { opacity: 1; } 95% { opacity: 0.6; } 100% { transform: translateY(100vh) translateX(var(--drift,0px)) rotate(360deg); opacity: 0; } }

        .ice-floor { position: fixed; bottom: 0; left: 0; width: 100%; height: 55%; background-image: linear-gradient(rgba(0,180,255,0.15) 1px, transparent 1px), linear-gradient(90deg, rgba(0,180,255,0.15) 1px, transparent 1px); background-size: 60px 60px; transform: perspective(500px) rotateX(70deg); transform-origin: bottom; z-index: 1; opacity: 0.5; animation: iceShimmer 10s linear infinite; }
        @keyframes iceShimmer { from { background-position: 0 0; } to { background-position: 0 60px; } }

        .glow-orb { position: absolute; border-radius: 50%; filter: blur(100px); animation: orbPulse 5s ease-in-out infinite; }
        .glow-orb-1 { width: 600px; height: 600px; background: #0055cc; top: -10%; left: -5%; opacity: 0.25; }
        .glow-orb-2 { width: 500px; height: 500px; background: #0099ff; bottom: 10%; right: 5%; opacity: 0.2; animation-delay: 1.8s; }
        .glow-orb-3 { width: 400px; height: 400px; background: #00ccff; top: 40%; left: 45%; opacity: 0.15; animation-delay: 3.5s; }
        @keyframes orbPulse { 0%,100% { transform: scale(1); opacity: 0.2; } 50% { transform: scale(1.4); opacity: 0.4; } }

        .aurora { position: absolute; top: 0; left: 0; width: 100%; height: 40%; background: linear-gradient(180deg, rgba(0,100,200,0.08) 0%, rgba(0,200,255,0.05) 40%, transparent 100%); animation: auroraWave 8s ease-in-out infinite alternate; }
        @keyframes auroraWave { 0% { transform: skewX(-3deg) scaleY(1); opacity: 0.6; } 50% { transform: skewX(2deg) scaleY(1.1); opacity: 1; } 100% { transform: skewX(-1deg) scaleY(0.9); opacity: 0.7; } }

        /* Navbar */
        .navbar { background: rgba(0,8,20,0.95); border-bottom: 3px solid var(--blue-ice); padding: 0 2rem; height: 120px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; backdrop-filter: blur(20px); box-shadow: 0 5px 40px rgba(0,180,255,0.25); }
        .logo-area { display: flex; flex-direction: column; position: relative; }
        .logo-container { position: relative; display: inline-block; }
        .logo { font-family: 'Rajdhani', sans-serif; font-size: 3rem; font-weight: 900; letter-spacing: 4px; line-height: 1; text-transform: uppercase; background: linear-gradient(180deg, #88ddff 0%, #00aaff 45%, #0066cc 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; filter: drop-shadow(0 0 20px rgba(0,180,255,0.9)); animation: logoPulse 3s ease-in-out infinite; }
        @keyframes logoPulse { 0%,100% { filter: drop-shadow(0 0 20px rgba(0,180,255,0.9)) drop-shadow(0 0 40px rgba(0,150,255,0.5)); } 50% { filter: drop-shadow(0 0 35px rgba(0,220,255,1)) drop-shadow(0 0 70px rgba(0,180,255,0.7)); } }
        .logo-accent { position: absolute; height: 2px; background: linear-gradient(90deg, transparent, var(--blue-ice), transparent); animation: accentSlide 2s ease-in-out infinite; }
        .logo-accent-top { top: -10px; left: 0; right: 0; }
        .logo-accent-bottom { bottom: -10px; left: 0; right: 0; animation-delay: 1s; }
        @keyframes accentSlide { 0%,100% { opacity: 0.3; transform: scaleX(0.7); } 50% { opacity: 1; transform: scaleX(1); } }
        .network-badge { position: absolute; top: -8px; right: -45px; background: var(--blue-ice); color: #000; font-size: 0.5rem; padding: 3px 8px; font-weight: 900; letter-spacing: 1px; transform: rotate(12deg); box-shadow: 0 0 15px var(--blue-glow); animation: badgeGlow 2s ease-in-out infinite; }
        @keyframes badgeGlow { 0%,100% { box-shadow: 0 0 15px var(--blue-glow); } 50% { box-shadow: 0 0 30px var(--blue-glow); } }
        .subtitle { font-family: 'Rajdhani'; font-size: 0.7rem; color: #4477aa; letter-spacing: 4px; margin-top: 8px; font-weight: 700; text-transform: uppercase; opacity: 0.8; }
        .sync-indicator { display: flex; align-items: center; gap: 8px; margin-top: 6px; font-size: 0.65rem; color: #336688; font-family: 'Rajdhani'; font-weight: 700; letter-spacing: 2px; }
        .sync-dot { width: 6px; height: 6px; background: #00ffcc; border-radius: 50%; box-shadow: 0 0 10px #00ffcc; animation: syncPulse 2s ease-in-out infinite; }
        @keyframes syncPulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

        /* Search */
        .search-container { display: flex; align-items: center; gap: 10px; }
        .search-box { background: rgba(0,15,40,0.8); border: 2px solid var(--border-mid); padding: 12px 20px; color: var(--text-main); font-family: 'Rajdhani', sans-serif; font-weight: 600; font-size: 1rem; width: 300px; transition: 0.3s; outline: none; }
        .search-box:focus { border-color: var(--blue-ice); box-shadow: 0 0 20px var(--blue-glow-soft); }
        .search-box::placeholder { color: #334455; }
        .search-btn { background: var(--blue-ice); border: none; padding: 12px 24px; color: #000; font-family: 'Rajdhani', sans-serif; font-weight: 800; cursor: pointer; transition: 0.3s; text-transform: uppercase; letter-spacing: 1px; }
        .search-btn:hover { box-shadow: 0 0 25px var(--blue-glow); transform: translateY(-2px); }
        .clear-btn { background: var(--border-mid); border: 1px solid var(--border-bright); padding: 12px 20px; color: var(--text-dim); font-family: 'Rajdhani', sans-serif; font-weight: 700; cursor: pointer; transition: 0.3s; text-transform: uppercase; letter-spacing: 1px; }
        .clear-btn:hover { background: var(--border-bright); color: #fff; }

        /* Mode Bar */
        .mode-bar { background: rgba(0,10,25,0.9); padding: 20px 0; border-bottom: 1px solid var(--border-dim); position: relative; z-index: 10; overflow-x: auto; overflow-y: hidden; }
        .mode-bar::-webkit-scrollbar { height: 6px; }
        .mode-bar::-webkit-scrollbar-track { background: #000; }
        .mode-bar::-webkit-scrollbar-thumb { background: var(--border-mid); border-radius: 3px; }
        .mode-bar::-webkit-scrollbar-thumb:hover { background: var(--blue-ice); }
        .mode-list-container { display: flex; gap: 15px; padding: 0 20px; min-width: min-content; }
        .mode-btn { background: linear-gradient(135deg, rgba(0,20,50,0.9) 0%, rgba(0,10,30,0.9) 100%); border: 2px solid var(--border-mid); padding: 12px 20px; color: var(--text-dim); font-family: 'Rajdhani', sans-serif; font-weight: 700; cursor: pointer; transition: all 0.4s cubic-bezier(0.4,0,0.2,1); clip-path: polygon(8% 0,100% 0,92% 100%,0% 100%); display: flex; flex-direction: column; align-items: center; gap: 8px; min-width: 110px; position: relative; overflow: hidden; white-space: nowrap; }
        .mode-btn::before { content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%; background: linear-gradient(90deg, transparent, rgba(0,180,255,0.25), transparent); transition: left 0.5s; }
        .mode-btn:hover::before { left: 100%; }
        .mode-btn.active, .mode-btn:hover { background: linear-gradient(135deg, var(--blue-ice) 0%, var(--blue-mid) 100%); color: #000; box-shadow: 0 0 30px var(--blue-glow); border-color: var(--blue-ice); transform: translateY(-3px) scale(1.05); }
        .mode-icon { width: 32px; height: 32px; filter: drop-shadow(0 0 8px rgba(0,180,255,0.5)); transition: all 0.4s; opacity: 0.7; }
        .mode-icon.emoji { font-size: 2rem; width: auto; height: auto; }
        .mode-btn.active .mode-icon, .mode-btn:hover .mode-icon { filter: drop-shadow(0 0 12px rgba(0,0,0,0.8)); opacity: 1; transform: scale(1.2) rotate(5deg); }
        .mode-label { font-size: 0.85rem; letter-spacing: 1px; text-transform: uppercase; }

        /* Board */
        .board { position: relative; z-index: 5; padding: 2.5rem; display: flex; gap: 20px; width: 100%; box-sizing: border-box; overflow-x: auto; opacity: 1; transform: translateY(0); transition: opacity 0.3s ease, transform 0.3s ease; }
        .board.transitioning { opacity: 0; transform: translateY(30px) scale(0.98); }
        .board.fade-in { animation: boardFadeIn 0.5s cubic-bezier(0.4,0,0.2,1) forwards; }
        @keyframes boardFadeIn { 0% { opacity: 0; transform: translateY(30px) scale(0.98); filter: blur(5px); } 100% { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); } }
        .column { background: rgba(0,10,25,0.96); border: 1px solid var(--border-mid); flex: 1; min-width: 320px; border-radius: 4px; overflow: hidden; opacity: 0; transform: translateX(-30px); animation: slideIn 0.5s cubic-bezier(0.4,0,0.2,1) forwards; }
        .column:nth-child(1) { animation-delay: 0.1s; } .column:nth-child(2) { animation-delay: 0.2s; } .column:nth-child(3) { animation-delay: 0.3s; } .column:nth-child(4) { animation-delay: 0.4s; } .column:nth-child(5) { animation-delay: 0.5s; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(-30px) scale(0.95); } to { opacity: 1; transform: translateX(0) scale(1); } }
        .col-header { padding: 20px; background: linear-gradient(to bottom, rgba(0,60,120,0.6), transparent); border-bottom: 2px solid var(--blue-ice); text-align: center; }
        .col-title { font-family: 'Rajdhani'; font-size: 1.6rem; font-weight: 800; color: #fff; }

        /* Player cards */
        .player-card { background: rgba(0,20,50,0.35); border: 1px solid var(--border-dim); margin: 12px; padding: 14px; transition: 0.3s; cursor: pointer; }
        .player-card:hover { transform: translateX(5px); border-color: var(--blue-ice); box-shadow: 0 0 15px var(--blue-glow-soft); }
        .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(80px, 1fr)); gap: 6px; margin-top: 12px; border-top: 1px solid var(--border-dim); padding-top: 10px; }
        .stat-box { background: rgba(0,5,15,0.8); padding: 5px 8px; font-size: 0.6rem; display: flex; justify-content: space-between; border: 1px solid var(--border-dim); }
        .p-rank { font-family: 'Rajdhani'; font-weight: 900; font-size: 1.4rem; }

        /* Head icon in cards */
        .player-head { width: 36px; height: 36px; image-rendering: pixelated; border-radius: 4px; border: 1px solid rgba(0,180,255,0.2); flex-shrink: 0; }

        /* Staff */
        .staff-grid { display: flex; justify-content: center; gap: 20px; width: 100%; padding: 50px 20px; flex-wrap: wrap; }
        .staff-card { background: rgba(0,10,25,0.9); border: 1px solid var(--border-mid); padding: 30px; width: 280px; text-align: center; transition: 0.4s; text-decoration: none; }
        .staff-card:hover { border-color: var(--blue-ice); transform: translateY(-10px); }
        .staff-role { color: var(--blue-ice); font-family: 'Rajdhani'; font-weight: 800; font-size: 0.8rem; letter-spacing: 2px; }
        .staff-name { color: #fff; font-size: 1.5rem; font-weight: 800; display: block; margin-top: 10px; }

        /* Community */
        .community-hub { width: 100%; min-height: 600px; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px 40px; background: linear-gradient(135deg, rgba(0,20,50,0.7) 0%, rgba(0,8,20,0.95) 100%); }
        .community-title { font-family: 'Rajdhani'; font-size: 4rem; font-weight: 900; color: var(--blue-ice); text-align: center; margin-bottom: 20px; text-shadow: 0 0 30px var(--blue-glow); animation: titlePulse 3s ease-in-out infinite; }
        @keyframes titlePulse { 0%,100% { text-shadow: 0 0 30px var(--blue-glow); } 50% { text-shadow: 0 0 60px var(--blue-glow); } }
        .community-subtitle { font-family: 'Rajdhani'; font-size: 1.2rem; color: #557799; text-align: center; margin-bottom: 50px; letter-spacing: 3px; text-transform: uppercase; }
        .discord-button { background: linear-gradient(135deg, #5865F2 0%, #4752C4 100%); color: white; padding: 25px 60px; text-decoration: none; font-family: 'Rajdhani'; font-weight: 800; font-size: 2rem; border-radius: 8px; transition: all 0.3s ease; box-shadow: 0 10px 40px rgba(88,101,242,0.4); display: flex; align-items: center; gap: 15px; margin-bottom: 50px; }
        .discord-button:hover { transform: translateY(-5px) scale(1.05); }
        .realm-info { background: linear-gradient(135deg, var(--blue-ice) 0%, var(--blue-mid) 100%); color: #000; padding: 25px 60px; text-decoration: none; font-family: 'Rajdhani'; font-weight: 800; border-radius: 8px; transition: all 0.3s ease; display: flex; align-items: center; gap: 15px; border: none; }
        .realm-info:hover { transform: translateY(-5px) scale(1.05); }
        .realm-label { font-family: 'Rajdhani'; font-size: 0.75rem; font-weight: 700; color: rgba(0,0,0,0.6); letter-spacing: 2px; text-transform: uppercase; }
        .realm-code { font-family: 'Rajdhani'; font-size: 2rem; font-weight: 800; color: #000; }
        .community-stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 30px; width: 100%; max-width: 900px; margin-top: 40px; }
        .stat-card { background: rgba(0,20,50,0.6); border: 2px solid var(--border-mid); padding: 30px; text-align: center; transition: all 0.3s ease; border-radius: 4px; }
        .stat-card:hover { border-color: var(--blue-ice); transform: translateY(-5px); }
        .stat-number { font-family: 'Rajdhani'; font-size: 3rem; font-weight: 900; color: var(--blue-ice); margin-bottom: 10px; }
        .stat-label { font-family: 'Rajdhani'; font-size: 1rem; color: #557799; letter-spacing: 2px; text-transform: uppercase; }
        .community-features { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; width: 100%; max-width: 1000px; margin-top: 50px; }
        .feature-card { background: rgba(0,10,30,0.8); border: 1px solid var(--border-dim); padding: 25px; border-radius: 4px; transition: all 0.3s ease; }
        .feature-card:hover { border-color: var(--blue-ice); transform: translateY(-3px); }
        .feature-icon { font-size: 2.5rem; margin-bottom: 15px; }
        .feature-title { font-family: 'Rajdhani'; font-size: 1.3rem; font-weight: 800; color: #fff; margin-bottom: 10px; }
        .feature-desc { font-size: 0.9rem; color: #557799; line-height: 1.6; }

        /* Modal */
        .search-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,5,15,0.88); z-index: 200; backdrop-filter: blur(8px); }
        .search-modal.active { display: flex; align-items: center; justify-content: center; }
        .player-modal-card { background: linear-gradient(160deg, #001428 0%, #000c1e 60%, #000814 100%); border: 1px solid rgba(0,180,255,0.25); border-radius: 16px; padding: 40px 36px 36px; width: 100%; max-width: 500px; position: relative; box-shadow: 0 0 80px rgba(0,120,255,0.12), 0 30px 80px rgba(0,0,0,0.7); margin: 20px; }
        .player-modal-card::before { content: ''; position: absolute; top: 0; left: 15%; right: 15%; height: 1px; background: linear-gradient(90deg, transparent, rgba(0,180,255,0.5), transparent); }
        .modal-close-btn { position: absolute; top: 14px; right: 14px; background: rgba(0,30,60,0.9); border: 1px solid rgba(0,180,255,0.2); color: #446688; font-size: 1rem; width: 32px; height: 32px; border-radius: 50%; cursor: pointer; transition: 0.25s; display: flex; align-items: center; justify-content: center; font-weight: 900; }
        .modal-close-btn:hover { background: var(--blue-ice); color: #000; }
        .player-avatar-wrap { display: flex; flex-direction: column; align-items: center; margin-bottom: 18px; }
        .player-avatar { width: 120px; height: 180px; border-radius: 12px; border: 2px solid rgba(0,180,255,0.3); box-shadow: 0 0 30px rgba(0,150,255,0.2); object-fit: contain; background: rgba(0,10,25,0.5); image-rendering: pixelated; }
        .player-name-modal { font-family: 'Rajdhani'; font-size: 1.9rem; font-weight: 900; color: #fff; margin-top: 14px; letter-spacing: 1px; text-align: center; }
        .player-region-modal { font-family: 'Rajdhani'; font-size: 0.8rem; font-weight: 700; color: #3a5a78; letter-spacing: 3px; text-transform: uppercase; margin-top: 3px; text-align: center; }
        .player-rank-pill { display: flex; align-items: center; justify-content: center; gap: 10px; background: rgba(0,25,60,0.8); border: 1px solid rgba(0,180,255,0.2); border-radius: 8px; padding: 11px 22px; margin: 16px auto 0; width: fit-content; }
        .rank-pill-number { font-family: 'Rajdhani'; font-size: 1.4rem; font-weight: 900; color: var(--blue-ice); }
        .rank-pill-sep { color: #224466; }
        .rank-pill-pts { font-family: 'Rajdhani'; font-size: 0.95rem; color: #3a5a78; letter-spacing: 1px; }
        .modal-section-title { font-family: 'Rajdhani'; font-size: 0.7rem; font-weight: 800; color: #3a5a78; letter-spacing: 3px; text-transform: uppercase; margin: 26px 0 10px; }
        .kit-tiers-grid { display: flex; flex-wrap: wrap; gap: 7px; }
        .kit-tier-chip { display: flex; flex-direction: column; align-items: center; gap: 5px; background: rgba(0,18,45,0.7); border: 1px solid rgba(0,80,160,0.2); border-radius: 10px; padding: 9px 9px 7px; cursor: default; transition: all 0.2s ease; position: relative; min-width: 50px; }
        .kit-tier-chip:hover { border-color: rgba(0,180,255,0.45); background: rgba(0,28,65,0.9); transform: translateY(-3px); box-shadow: 0 8px 20px rgba(0,80,200,0.18); z-index: 5; }
        .kit-tier-chip img.chip-icon { width: 26px; height: 26px; filter: drop-shadow(0 0 4px rgba(0,180,255,0.35)); }
        .chip-rank { font-family: 'Rajdhani'; font-size: 0.78rem; font-weight: 900; line-height: 1; }
        .chip-kit { font-family: 'Rajdhani'; font-size: 0.55rem; color: #2a3d50; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; }
        .kit-tier-chip.unranked { opacity: 0.3; }
        .tier-tooltip { position: absolute; bottom: calc(100% + 8px); left: 50%; transform: translateX(-50%); background: rgba(0,10,25,0.98); border: 1px solid rgba(0,180,255,0.35); border-radius: 7px; padding: 8px 13px; white-space: nowrap; pointer-events: none; opacity: 0; transition: opacity 0.18s; z-index: 20; }
        .tier-tooltip::after { content: ''; position: absolute; top: 100%; left: 50%; transform: translateX(-50%); border: 5px solid transparent; border-top-color: rgba(0,180,255,0.35); }
        .kit-tier-chip:hover .tier-tooltip { opacity: 1; }
        .tooltip-kit-name { font-family: 'Rajdhani'; font-size: 0.7rem; color: #3a5a78; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 3px; }
        .tooltip-current { font-family: 'Rajdhani'; font-size: 0.95rem; font-weight: 800; }
        .tooltip-peak { font-family: 'Rajdhani'; font-size: 0.8rem; color: var(--ht-gold); margin-top: 3px; }
        .no-results { text-align: center; padding: 60px 20px; color: #334455; font-size: 1.2rem; }
    </style>
</head>
<body>

<div class="background-container">
    <div class="bg-gradient"></div>
    <div class="stars"></div>
    <div class="aurora"></div>
    <div class="glow-orb glow-orb-1"></div>
    <div class="glow-orb glow-orb-2"></div>
    <div class="glow-orb glow-orb-3"></div>
    <div id="snowContainer"></div>
</div>
<div class="ice-floor"></div>

<nav class="navbar">
    <div class="logo-area">
        <div class="logo-container">
            <div class="logo-accent logo-accent-top"></div>
            <div class="logo">J-NETWORK</div>
            <div class="logo-accent logo-accent-bottom"></div>
            <div class="network-badge">OG</div>
        </div>
        <div class="subtitle">Made by BronzeHarpy80</div>
        <div class="sync-indicator"><div class="sync-dot"></div><span>SYNCED WITH DISCORD BOT</span></div>
    </div>
    <div class="search-container">
        <input type="text" id="searchInput" class="search-box" placeholder="Search player..." onkeypress="if(event.key==='Enter')searchPlayer()">
        <button class="search-btn" onclick="searchPlayer()">SEARCH</button>
        <button class="clear-btn" onclick="clearSearch()">CLEAR</button>
    </div>
</nav>

<div class="mode-bar"><div class="mode-list-container" id="modeList"></div></div>
<div class="board" id="board">Loading Database...</div>

<div class="search-modal" id="searchModal">
    <div id="searchResults"></div>
</div>

<script>
    /* ── Animated Favicon ── */
    (function () {
        const canvas = document.createElement('canvas');
        canvas.width = 64; canvas.height = 64;
        const ctx = canvas.getContext('2d');
        let angle = 0, pulse = 0;
        function draw() {
            ctx.clearRect(0,0,64,64);
            ctx.fillStyle = '#000814';
            ctx.beginPath(); ctx.roundRect(0,0,64,64,10); ctx.fill();
            const g = ctx.createRadialGradient(32,32,4,32,32,30);
            g.addColorStop(0,`rgba(0,180,255,${0.35+Math.sin(pulse)*0.25})`);
            g.addColorStop(1,'transparent');
            ctx.fillStyle = g; ctx.beginPath(); ctx.arc(32,32,30,0,Math.PI*2); ctx.fill();
            ctx.save(); ctx.translate(32,32); ctx.rotate(angle);
            ctx.strokeStyle = `rgba(0,210,255,${0.7+Math.sin(pulse)*0.3})`; ctx.lineWidth = 2; ctx.lineCap = 'round';
            for(let i=0;i<6;i++){
                ctx.rotate(Math.PI/3);
                ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(0,22); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(0,10); ctx.lineTo(7,16); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(0,10); ctx.lineTo(-7,16); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(0,17); ctx.lineTo(4,22); ctx.stroke();
                ctx.beginPath(); ctx.moveTo(0,17); ctx.lineTo(-4,22); ctx.stroke();
            }
            ctx.restore();
            const d = ctx.createRadialGradient(32,32,0,32,32,5);
            d.addColorStop(0,'#fff'); d.addColorStop(0.6,'#00ccff'); d.addColorStop(1,'transparent');
            ctx.fillStyle=d; ctx.beginPath(); ctx.arc(32,32,5,0,Math.PI*2); ctx.fill();
            ctx.strokeStyle=`rgba(0,180,255,${0.4+Math.sin(pulse)*0.6})`; ctx.lineWidth=3;
            ctx.beginPath(); ctx.roundRect(2,2,60,60,9); ctx.stroke();
            let link = document.querySelector("link[rel~='icon']");
            if(!link){link=document.createElement('link');link.rel='icon';document.head.appendChild(link);}
            link.href = canvas.toDataURL();
            angle += 0.025; pulse += 0.07;
            requestAnimationFrame(draw);
        }
        draw();
    })();

    /* ── Snow ── */
    function createSnow() {
        const c = document.getElementById('snowContainer');
        const f = ['❄','❅','❆','·','•','*','✦'];
        for(let i=0;i<90;i++){
            const el = document.createElement('div');
            el.className = 'snowflake';
            el.textContent = f[Math.floor(Math.random()*f.length)];
            el.style.cssText = `left:${Math.random()*100}%;font-size:${8+Math.random()*20}px;opacity:${0.2+Math.random()*0.8};--drift:${(Math.random()-0.5)*220}px;animation-duration:${6+Math.random()*16}s;animation-delay:${Math.random()*18}s;`;
            c.appendChild(el);
        }
    }

    /* ── HT Colors ── */
    const HT_COLORS = { 'HT1':'#ffcc00','HT2':'#d0d0d0','HT3':'#cd7f32','HT4':'#55aaff','HT5':'#e8c4ff' };
    function htColor(r) { return HT_COLORS[r] || '#fff'; }
    function isHT(r) { return r && r.startsWith('HT'); }
    const TIER_ORDER = ['HT1','HT2','HT3','HT4','HT5','LT1','LT2','LT3','LT4','LT5','UR'];
    function tierRank(r) { const i = TIER_ORDER.indexOf(r); return i===-1?99:i; }
    function isBetter(a,b) { return tierRank(a)<tierRank(b); }

    /* ── Skin URLs ── */
    /* 
       headUrl: uses player.skinUrl if set in players.json, else minotar helm
       bodyUrl: uses player.skinUrl if set in players.json, else minotar body
       To fix Bedrock skins, add "skinUrl": "https://..." to the player in players.json
    */
    function headUrl(p) {
        if (p.skinUrl) return p.skinUrl;
        return `https://tabavatars.net/avatar/?username=${encodeURIComponent(p.name)}&type=helm&size=36`;
    }
    function bodyUrl(p) {
        if (p.skinUrl) return p.skinUrl;
        return `https://tabavatars.net/avatar/?username=${encodeURIComponent(p.name)}&type=body&size=120`;
    }

    /* ── App ── */
    const MODES = ["Overall","Sword","Vanilla","UHC","Pot","NetherOP","SMP","Axe","Mace","Iron UHC","Community","Staff"];
    const KITS  = ["Sword","Vanilla","UHC","Pot","NetherOP","SMP","Axe","Mace","Iron UHC"];
    const MODE_ICONS = {
        "Overall":"https://mctiers.com/tier_icons/overall.svg","Sword":"https://mctiers.com/tier_icons/sword.svg",
        "Vanilla":"https://mctiers.com/tier_icons/vanilla.svg","UHC":"https://mctiers.com/tier_icons/uhc.svg",
        "Pot":"https://mctiers.com/tier_icons/pot.svg","NetherOP":"https://mctiers.com/tier_icons/nethop.svg",
        "SMP":"https://mctiers.com/tier_icons/smp.svg","Axe":"https://mctiers.com/tier_icons/axe.svg",
        "Mace":"https://mctiers.com/tier_icons/mace.svg","Iron UHC":"https://mctiers.com/tier_icons/uhc.svg",
        "Community":"👥","Staff":"👑"
    };

    let PLAYERS = [];
    let currentMode = "Overall";

    async function loadPlayers() {
        try {
            const res = await fetch(`https://raw.githubusercontent.com/Bronze-solos/j-network/main/players.json?t=${Date.now()}`);
            PLAYERS = await res.json();
            renderTabs();
            renderBoard();
        } catch(e) {
            document.getElementById('board').innerHTML = '<div style="padding:40px;text-align:center;color:#334455;font-family:Rajdhani;font-size:1.5rem;">Failed to load rankings.</div>';
        }
    }

    function setMode(m) {
        const board = document.getElementById('board');
        board.classList.add('transitioning');
        setTimeout(() => {
            currentMode = m; renderTabs(); renderBoard();
            board.classList.remove('transitioning');
            board.classList.add('fade-in');
            setTimeout(() => board.classList.remove('fade-in'), 500);
        }, 300);
    }

    function renderTabs() {
        document.getElementById('modeList').innerHTML = MODES.map(m => {
            const icon = MODE_ICONS[m];
            const isEmoji = m==="Community"||m==="Staff";
            return `<button class="mode-btn ${m===currentMode?'active':''}" onclick="setMode('${m}')">
                ${isEmoji?`<div class="mode-icon emoji">${icon}</div>`:`<img src="${icon}" alt="${m}" class="mode-icon"/>`}
                <span class="mode-label">${m}</span>
            </button>`;
        }).join('');
    }

    function renderBoard() {
        const board = document.getElementById('board');
        board.innerHTML = '';
        if(currentMode==="Community") { renderCommunity(board); return; }
        if(currentMode==="Staff") { renderStaff(board); return; }
        if(currentMode==="Overall") renderOverall(board);
        else renderKitTiers(board);
    }

    function renderCommunity(board) {
        board.innerHTML = `<div class="community-hub">
            <div class="community-title">JOIN OUR COMMUNITY</div>
            <div class="community-subtitle">Connect • Compete • Conquer</div>
            <div style="display:flex;gap:30px;margin-bottom:50px;flex-wrap:wrap;justify-content:center;">
                <a href="https://discord.gg/DzSfUJcgQ7" target="_blank" class="discord-button"><span style="font-size:2.5rem">💬</span><span>JOIN DISCORD SERVER</span></a>
                <a href="https://realms.gg/jRzLnhzh5M4" target="_blank" class="realm-info"><span style="font-size:2.5rem">🎮</span><div><div class="realm-label">REALM CODE</div><div class="realm-code">jRzLnhzh5M4</div></div></a>
            </div>
            <div class="community-stats">
                <div class="stat-card"><div class="stat-number">2,000+</div><div class="stat-label">Active Players</div></div>
                <div class="stat-card"><div class="stat-number">9</div><div class="stat-label">Game Modes</div></div>
                <div class="stat-card"><div class="stat-number">24/7</div><div class="stat-label">Server Uptime</div></div>
            </div>
            <div class="community-features">
                <div class="feature-card"><div class="feature-icon">⚔️</div><div class="feature-title">Competitive PvP</div><div class="feature-desc">Join ranked matches and climb the leaderboards across multiple game modes</div></div>
                <div class="feature-card"><div class="feature-icon">🏆</div><div class="feature-title">Tournaments</div><div class="feature-desc">Participate in weekly tournaments with exclusive rewards and prizes</div></div>
                <div class="feature-card"><div class="feature-icon">👥</div><div class="feature-title">Active Community</div><div class="feature-desc">Join a thriving community of skilled players and make new friends</div></div>
                <div class="feature-card"><div class="feature-icon">⭐</div><div class="feature-title">Prestige System</div><div class="feature-desc">Earn prestige points and unlock exclusive perks as you progress</div></div>
            </div>
        </div>`;
    }

    function renderStaff(board) {
        board.innerHTML = `<div class="staff-grid">
            <a href="#" class="staff-card"><span class="staff-role">OWNER</span><span class="staff-name">JeffersonD44</span></a>
            <a href="#" class="staff-card"><span class="staff-role">CO-OWNER</span><span class="staff-name">BronzeHarpy80</span></a>
            <a href="#" class="staff-card"><span class="staff-role">HEAD ADMIN</span><span class="staff-name">N0tsqurmyshi</span></a>
            <a href="#" class="staff-card"><span class="staff-role">CO HEAD ADMIN</span><span class="staff-name">Aktresh</span></a>
        </div>`;
    }

    function renderOverall(board) {
        const sorted = [...PLAYERS].sort((a,b) => (b.prestige||0)-(a.prestige||0));
        const rankStyles = [
            { bg: 'linear-gradient(135deg,#7c5c00,#ffcc00,#a07800)', color: '#000', shadow: '0 0 20px rgba(255,204,0,0.6)' },
            { bg: 'linear-gradient(135deg,#5a5a5a,#d0d0d0,#888)', color: '#000', shadow: '0 0 20px rgba(200,200,200,0.5)' },
            { bg: 'linear-gradient(135deg,#6b3a1f,#cd7f32,#8b5e2f)', color: '#000', shadow: '0 0 20px rgba(205,127,50,0.5)' },
        ];
        board.innerHTML = `<div class="column" style="min-width:100%">
            <div class="col-header"><div class="col-title">GLOBAL PRESTIGE</div></div>
            <div>${sorted.map((p,i) => {
                const rs = rankStyles[i];
                const rankEl = rs
                    ? `<div style="background:${rs.bg};color:${rs.color};font-weight:900;font-size:1.2rem;font-family:'Rajdhani';padding:6px 12px;border-radius:6px;box-shadow:${rs.shadow};min-width:48px;text-align:center;">#${i+1}</div>`
                    : `<div style="color:var(--blue-ice);font-weight:900;font-size:1.4rem;font-family:'Rajdhani';">#${i+1}</div>`;
                return `<div class="player-card" onclick="showPlayerDetails('${p.name}')">
                    <div style="display:flex;justify-content:space-between;align-items:center;">
                        <div style="display:flex;align-items:center;gap:12px;">
                            <img src="${headUrl(p)}" class="player-head" alt="" onerror="this.style.opacity='0'"/>
                            ${rankEl}
                            <div>
                                <div style="font-weight:800;">${p.name}</div>
                                <div style="font-size:0.7rem;color:#335566;">${p.region} • ${p.prestige||0} PTS</div>
                            </div>
                        </div>
                    </div>
                    <div class="stat-grid">${KITS.map(k => {
                        const r = (p.tiers&&p.tiers[k])?p.tiers[k]:"UR";
                        return `<div class="stat-box"><span style="color:#223344">${k.slice(0,3).toUpperCase()}</span><span style="color:${isHT(r)?htColor(r):(r==='UR'?'#112233':'#fff')}">${r}</span></div>`;
                    }).join('')}</div>
                </div>`;
            }).join('')}</div>
        </div>`;
    }

    function renderKitTiers(board) {
        const eligible = PLAYERS.filter(p => p.tiers&&p.tiers[currentMode]&&p.tiers[currentMode]!=="UR");
        for(let t=1;t<=5;t++) {
            const inTier = eligible.filter(p => p.tiers[currentMode].includes(t.toString()));
            inTier.sort((a,b) => {
                const ra=a.tiers[currentMode],rb=b.tiers[currentMode];
                const aHT=ra.startsWith('HT'),bHT=rb.startsWith('HT');
                if(aHT&&!bHT) return -1; if(!aHT&&bHT) return 1;
                return (b.prestige||0)-(a.prestige||0);
            });
            const content = inTier.length===0
                ? `<div style="padding:40px;text-align:center;color:#112233;font-family:'Rajdhani';font-size:0.9rem;">NO RANKED PLAYERS</div>`
                : inTier.map(p => {
                    const r = p.tiers[currentMode];
                    const cb = isHT(r)?`border-color:${htColor(r)};box-shadow:inset 0 0 10px ${htColor(r)}22;`:'';
                    return `<div class="player-card" style="${cb}" onclick="showPlayerDetails('${p.name}')">
                        <div style="display:flex;justify-content:space-between;align-items:center;">
                            <div style="display:flex;align-items:center;gap:10px;">
                                <img src="${headUrl(p)}" class="player-head" alt="" onerror="this.style.opacity='0'"/>
                                <div>
                                    <div style="font-weight:800;">${p.name}</div>
                                    <div style="font-size:0.7rem;color:#334455;">${p.region}</div>
                                </div>
                            </div>
                            <div class="p-rank" style="color:${isHT(r)?htColor(r):'#ffffff'}">${r}</div>
                        </div>
                    </div>`;
                }).join('');
            board.innerHTML += `<div class="column"><div class="col-header"><div class="col-title">TIER ${t}</div><div style="font-size:0.7rem;color:#335566;margin-top:5px;font-weight:600;">${currentMode.toUpperCase()}</div></div><div>${content}</div></div>`;
        }
    }

    function searchPlayer() {
        const q = document.getElementById('searchInput').value.trim().toLowerCase();
        if(!q) return;
        const p = PLAYERS.find(p => p.name.toLowerCase()===q);
        if(p) showPlayerDetails(p.name);
        else {
            document.getElementById('searchResults').innerHTML = `
                <div class="player-modal-card" style="text-align:center;">
                    <button class="modal-close-btn" onclick="closeSearchModal()">✕</button>
                    <div style="padding:40px 0;">
                        <div style="font-family:'Rajdhani';font-size:3rem;margin-bottom:16px;">❄</div>
                        <div style="font-family:'Rajdhani';font-size:1.8rem;font-weight:800;color:var(--blue-ice);margin-bottom:10px;">PLAYER NOT FOUND</div>
                        <div style="color:#334455;font-family:'Rajdhani';">No player named "<span style="color:#557799">${document.getElementById('searchInput').value}</span>" in the database.</div>
                    </div>
                </div>`;
            document.getElementById('searchModal').classList.add('active');
        }
    }

    function showPlayerDetails(playerName) {
        const player = PLAYERS.find(p => p.name===playerName);
        if(!player) return;
        const globalRank = [...PLAYERS].sort((a,b)=>(b.prestige||0)-(a.prestige||0)).findIndex(p=>p.name===playerName)+1;
        const chips = KITS.map(kit => {
            const current = (player.tiers&&player.tiers[kit])?player.tiers[kit]:'UR';
            const peak = (player.peakTiers&&player.peakTiers[kit])?player.peakTiers[kit]:current;
            const ranked = current!=='UR';
            const rc = isHT(current)?htColor(current):(ranked?'#ffffff':'#2a3d50');
            const cb = isHT(current)?`border-color:${htColor(current)}44;`:'';
            const hasPeak = isBetter(peak,current);
            return `<div class="kit-tier-chip ${ranked?'':'unranked'}" style="${cb}">
                <img class="chip-icon" src="${MODE_ICONS[kit]}" alt="${kit}" onerror="this.style.display='none'"/>
                <span class="chip-rank" style="color:${rc}">${current}</span>
                <span class="chip-kit">${kit.slice(0,3)}</span>
                <div class="tier-tooltip">
                    <div class="tooltip-kit-name">${kit}</div>
                    <div class="tooltip-current" style="color:${rc}">${ranked?`Current: ${current}`:'Unranked'}</div>
                    ${hasPeak?`<div class="tooltip-peak">⭐ Peak: ${peak}</div>`:''}
                </div>
            </div>`;
        }).join('');

        document.getElementById('searchResults').innerHTML = `
            <div class="player-modal-card">
                <button class="modal-close-btn" onclick="closeSearchModal()">✕</button>
                <div class="player-avatar-wrap">
                    <div id="skin3d-container" style="width:140px;height:140px;border-radius:16px;border:2px solid rgba(0,180,255,0.4);box-shadow:0 0 40px rgba(0,150,255,0.3),inset 0 0 30px rgba(0,10,30,0.8);overflow:hidden;background:radial-gradient(circle at 50% 40%, #0a1a2e 0%, #000814 100%);display:flex;align-items:center;justify-content:center;">
                        <img src="${bodyUrl(player)}" style="width:100%;height:100%;object-fit:contain;image-rendering:pixelated;" onerror="this.style.opacity='0'"/>
                    </div>
                    <div class="player-name-modal">${player.name}</div>
                    <div class="player-region-modal">${player.region}</div>
                </div>
                <div class="player-rank-pill">
                    <span class="rank-pill-number">#${globalRank} OVERALL</span>
                    <span class="rank-pill-sep">•</span>
                    <span class="rank-pill-pts">${player.prestige||0} PTS</span>
                </div>
                <div class="modal-section-title">Tiers</div>
                <div class="kit-tiers-grid">${chips}</div>
            </div>`;
        document.getElementById('searchModal').classList.add('active');

        // Mount 3D viewer
        setTimeout(() => {
            try {
                if (typeof skinview3d === 'undefined') return;
                const container = document.getElementById('skin3d-container');
                if (!container) return;

                container.innerHTML = '';
                const canvas = document.createElement('canvas');
                canvas.width = 280; canvas.height = 280;
                canvas.style.cssText = 'width:140px;height:140px;display:block;';
                container.appendChild(canvas);

                const viewer = new skinview3d.SkinViewer({ canvas, width: 280, height: 280 });
                viewer.renderer.setClearColor(0x000000, 0);
                viewer.renderer.setPixelRatio(window.devicePixelRatio || 2);

                // Zoom way in for close bust crop
                viewer.zoom = 2.8;

                // Tilt camera down slightly to get that top-down bust angle
                viewer.camera.rotation.x = -0.3;

                // Slow rotate
                viewer.autoRotate = true;
                viewer.autoRotateSpeed = 0.6;
                viewer.controls.enabled = false;

                viewer.animation = new skinview3d.IdleAnimation();
                viewer.animation.speed = 0.4;

                viewer.loadSkin(`https://minotar.net/skin/${encodeURIComponent(player.name)}`);

            } catch(e) {
                console.warn('skinview3d failed:', e);
            }
        }, 150);
    }

    function closeSearchModal() { document.getElementById('searchModal').classList.remove('active'); }
    function clearSearch() { document.getElementById('searchInput').value=''; closeSearchModal(); }

    document.getElementById('searchModal').addEventListener('click', function(e){ if(e.target===this) closeSearchModal(); });
    document.addEventListener('keydown', e => { if(e.key==='Escape') closeSearchModal(); });

    createSnow();
    loadPlayers();
    setInterval(loadPlayers, 30000);
</script>
</body>
